<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3d-spinner - progress examples</title>
  <link rel="stylesheet" href="/examples/examples.css" />
</head>

<body>
  <nav class="topbar">
    <a href="/examples/index.html">Shapes</a>
    <a href="/examples/progress.html" class="active">Progress</a>
  </nav>

  <h1>3d-Spinner progress &amp; indeterminate</h1>

  <p class="note">
    Every animation runs under either spinner <strong>type</strong>: <code>progress</code> (drive
    the slider) or <code>indeterminate</code> (self-driving on a timer until you press Stop, which
    plays each animation's outro).
  </p>

  <div class="controls">
    <label for="type">
      <span>Type</span>
      <select id="type" autocomplete="off">
        <option value="progress" selected>progress</option>
        <option value="indeterminate">indeterminate</option>
      </select>
    </label>
    <label id="loop-ctl" for="loop" hidden>
      <span>Loop</span>
      <select id="loop" autocomplete="off">
        <option value="bounce" selected>bounce</option>
        <option value="restart">restart</option>
      </select>
    </label>
    <label id="speed-ctl" for="speed" hidden>
      <span>Speed</span>
      <select id="speed" autocomplete="off">
        <option value="3500">slow</option>
        <option value="2000" selected>normal</option>
        <option value="1000">fast</option>
      </select>
    </label>
    <button id="start">Start</button>
    <button id="stop">Stop</button>
    <button id="destroy">Destroy</button>
    <label for="render-tech">
      <span>Render tech</span>
      <select id="render-tech" autocomplete="off">
        <option value="canvas2d">Canvas 2D (software)</option>
        <option value="webgl" selected>WebGL</option>
        <option value="webgpu">WebGPU</option>
      </select>
    </label>
  </div>

  <label class="progress-control" id="progress-ctl" for="progress">
    <span>Progress</span>
    <input id="progress" type="range" min="0" max="100" value="0" />
    <span id="progress-label">0%</span>
  </label>

  <div class="spinner-grid">
    <section class="spinner-card">
      <h2>Progress bar</h2>
      <div id="stage-progress-bar" class="stage"></div>
    </section>

    <section class="spinner-card">
      <h2>Cube (pop + scale)</h2>
      <div id="stage-cube" class="stage"></div>
    </section>

    <section class="spinner-card">
      <h2>Plane (3D fly-through)</h2>
      <div id="stage-plane" class="stage"></div>
    </section>

    <section class="spinner-card">
      <h2>Test</h2>
      <div id="stage-test" class="stage"></div>
    </section>
  </div>

  <script type="module">
    import { createSpinner } from "/dist/index.js";
    import { ProgressBarAnimation } from "/dist/animations/progress-bar.js";
    import { SpinAnimation } from "/dist/animations/spin.js";
    import { PlaneAnimation } from "/dist/animations/plane.js";
    import { TestAnimation } from "/dist/animations/test.js";
    import { parseObj } from "/dist/engines/little-3d-engine/loaders/obj.js";

    const planeObj = await fetch("/meshes/test/plane01/PUSHILIN_Plane.obj").then((r) => r.text());

    const type = document.getElementById("type");
    const loop = document.getElementById("loop");
    const speed = document.getElementById("speed");
    const renderTech = document.getElementById("render-tech");
    const backend = () => renderTech.value;
    const progress = document.getElementById("progress");
    const progressLabel = document.getElementById("progress-label");

    const isIndeterminate = () => type.value === "indeterminate";

    const animations = [
      { target: document.getElementById("stage-progress-bar"), create: () => new ProgressBarAnimation() },
      {
        target: document.getElementById("stage-cube"),
        create: () => new SpinAnimation({ backend: backend(), progressAnimation: {} }),
      },
      {
        target: document.getElementById("stage-plane"),
        create: () =>
          new PlaneAnimation({ backend: backend(), mesh: () => parseObj(planeObj, { colors: ["#cbd5e1"] }) }),
      },
      { target: document.getElementById("stage-test"), create: () => new TestAnimation() },
    ];

    let spinners = [];

    function options(animation) {
      if (isIndeterminate()) {
        return { type: "indeterminate", animation, loop: loop.value, periodMs: Number(speed.value) };
      }
      return { type: "progress", animation, progress: Number(progress.value) / 100 };
    }

    function mount() {
      spinners.forEach((spinner) => spinner.destroy());
      spinners = animations.map((demo) => {
        demo.target.innerHTML = "";
        return createSpinner(demo.target, options(demo.create()));
      });
    }

    function syncControls() {
      const indeterminate = isIndeterminate();
      document.getElementById("loop-ctl").hidden = !indeterminate;
      document.getElementById("speed-ctl").hidden = !indeterminate;
      document.getElementById("progress-ctl").hidden = indeterminate;
    }

    type.onchange = () => {
      syncControls();
      mount();
    };
    loop.onchange = () => mount();
    speed.onchange = () => mount();
    renderTech.onchange = () => mount();

    document.getElementById("start").onclick = () => mount();
    document.getElementById("stop").onclick = () => spinners.forEach((spinner) => spinner.stop());
    document.getElementById("destroy").onclick = () => {
      spinners.forEach((spinner) => spinner.destroy());
      spinners = [];
    };

    progress.oninput = () => {
      progressLabel.textContent = `${progress.value}%`;
      if (!isIndeterminate()) {
        spinners.forEach((spinner) => spinner.setProgress(Number(progress.value) / 100));
      }
    };

    syncControls();
    mount();
  </script>
</body>

</html>
