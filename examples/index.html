<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3d-spinner — example & test harness</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 640px;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      #stage {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 120px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        font-size: 1.25rem;
        margin: 1rem 0;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
      }
      button {
        padding: 0.4rem 0.8rem;
        cursor: pointer;
      }
      .note {
        background: #fffbeb;
        border: 1px solid #fde68a;
        border-radius: 8px;
        padding: 0.75rem 1rem;
        font-size: 0.9rem;
      }
      code {
        background: #f3f4f6;
        padding: 0.1rem 0.3rem;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>3d-spinner</h1>

    <p class="note">
      ES modules need a server — don't open this file via <code>file://</code>. From the
      <code>public/</code> folder run <code>npm run build</code> then <code>npm run dev</code>,
      and open <code>/examples/index.html</code>.
    </p>

    <div id="stage"></div>

    <div class="controls">
      <button id="start-indeterminate">Start (indeterminate)</button>
      <button id="start-timeout">Start (timeout 3s)</button>
      <button id="start-until">Start (until now+5s)</button>
      <button id="stop">Stop</button>
      <button id="destroy">Destroy</button>
    </div>

    <p style="margin-top: 1rem">
      Progress:
      <input id="progress" type="range" min="0" max="100" value="0" />
      <span id="progress-label">0%</span>
    </p>

    <script type="module">
      import { createSpinner } from "../dist/index.js";

      const stage = document.getElementById("stage");
      const progress = document.getElementById("progress");
      const progressLabel = document.getElementById("progress-label");

      let spinner = null;

      function mount(options) {
        if (spinner) spinner.destroy();
        stage.innerHTML = "";
        spinner = createSpinner(stage, options);
      }

      document.getElementById("start-indeterminate").onclick = () => mount({});
      document.getElementById("start-timeout").onclick = () => mount({ timeout: 3000 });
      document.getElementById("start-until").onclick = () =>
        mount({ until: new Date(Date.now() + 5000) });
      document.getElementById("stop").onclick = () => spinner && spinner.stop();
      document.getElementById("destroy").onclick = () => {
        if (spinner) spinner.destroy();
        spinner = null;
      };

      progress.oninput = () => {
        const value = Number(progress.value) / 100;
        progressLabel.textContent = `${progress.value}%`;
        if (spinner) spinner.setProgress(value);
      };

      mount({});
    </script>
  </body>
</html>
