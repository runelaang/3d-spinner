<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3d-spinner - example & test harness</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        font-family: system-ui, sans-serif;
        max-width: 980px;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
        background: #0f1117;
        color: #e2e8f0;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: center;
        margin: 1rem 0;
      }
      .progress-control {
        display: grid;
        grid-template-columns: auto minmax(180px, 1fr) 3rem;
        gap: 0.75rem;
        align-items: center;
        margin: 1rem 0 1.5rem;
      }
      .spinner-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
      }
      .spinner-card {
        border: 1px solid #2d3748;
        border-radius: 8px;
        overflow: hidden;
        background: #141927;
      }
      .spinner-card h2 {
        margin: 0;
        padding: 0.75rem 1rem;
        border-bottom: 1px solid #2d3748;
        font-size: 1rem;
      }
      .stage {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 120px;
        font-size: 1.25rem;
        background: #1a1f2e;
      }
      label {
        display: inline-flex;
        gap: 0.4rem;
        align-items: center;
      }
      button {
        padding: 0.4rem 0.8rem;
        cursor: pointer;
        background: #2d3748;
        color: #e2e8f0;
        border: 1px solid #4a5568;
        border-radius: 6px;
      }
      button:hover {
        background: #3d4a60;
      }
      .note {
        background: #1a1a0a;
        border: 1px solid #4a3f00;
        border-radius: 8px;
        padding: 0.75rem 1rem;
        font-size: 0.9rem;
        color: #c8b84a;
      }
      code {
        background: #2d3748;
        padding: 0.1rem 0.3rem;
        border-radius: 4px;
      }
      @media (max-width: 700px) {
        .spinner-grid,
        .progress-control {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <h1>3d-spinner</h1>

    <p class="note">
      ES modules need a server - don't open this file via <code>file://</code>. From the
      <code>public/</code> folder run <code>npm run build</code> then <code>npm run dev</code>,
      and open <code>/examples/index.html</code>.
    </p>

    <div class="controls">
      <button id="start-indeterminate">Start (indeterminate)</button>
      <button id="start-timeout">Start (timeout 3s)</button>
      <button id="start-until">Start (until now+5s)</button>
      <button id="stop">Stop</button>
      <button id="destroy">Destroy</button>
    </div>

    <label class="progress-control" for="progress">
      <span>Progress</span>
      <input id="progress" type="range" min="0" max="100" value="0" />
      <span id="progress-label">0%</span>
    </label>

    <div class="spinner-grid">
      <section class="spinner-card">
        <h2>Test</h2>
        <div id="stage-test" class="stage"></div>
      </section>

      <section class="spinner-card">
        <h2>Progress bar</h2>
        <div id="stage-progress-bar" class="stage"></div>
      </section>
    </div>

    <script type="module">
      import { createSpinner } from "../dist/index.js";
      import { TestSpinner } from "../dist/plugins/test.js";
      import { ProgressBarSpinner } from "../dist/plugins/progress-bar.js";

      const progress = document.getElementById("progress");
      const progressLabel = document.getElementById("progress-label");

      let spinners = [];
      let lastOptions = {};

      const spinnerDemos = [
        { target: document.getElementById("stage-test"), create: () => new TestSpinner() },
        {
          target: document.getElementById("stage-progress-bar"),
          create: () => new ProgressBarSpinner(),
        },
      ];

      function mount(options) {
        lastOptions = options;
        spinners.forEach((spinner) => spinner.destroy());
        spinners = spinnerDemos.map((demo) => {
          demo.target.innerHTML = "";
          return createSpinner(demo.target, {
            plugin: demo.create(),
            ...options,
          });
        });
      }

      document.getElementById("start-indeterminate").onclick = () => mount({});
      document.getElementById("start-timeout").onclick = () => mount({ timeout: 3000 });
      document.getElementById("start-until").onclick = () =>
        mount({ until: new Date(Date.now() + 5000) });
      document.getElementById("stop").onclick = () => spinners.forEach((spinner) => spinner.stop());
      document.getElementById("destroy").onclick = () => {
        spinners.forEach((spinner) => spinner.destroy());
        spinners = [];
      };

      progress.oninput = () => {
        const value = Number(progress.value) / 100;
        progressLabel.textContent = `${progress.value}%`;
        spinners.forEach((spinner) => spinner.setProgress(value));
      };

      mount({});
    </script>
  </body>
</html>
